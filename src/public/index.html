<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
  <title>Netheril</title>
  <style>
    @font-face {
      font-family: 'Cuneiform';
      src: url('/fonts/NotoSansCuneiform-Regular.ttf');
    }
    @font-face {
      font-family: 'Cinzel Decorative';
      font-weight: 700;
      font-display: swap;
      src: url('/fonts/CinzelDecorative-Bold.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Cinzel Decorative';
      font-weight: 900;
      font-display: swap;
      src: url('/fonts/CinzelDecorative-Black.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Cinzel';
      font-weight: 500;
      font-display: swap;
      src: url('/fonts/Cinzel-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'EbonSigil';
      font-display: swap;
      src: url('/fonts/EbonSigil.otf') format('opentype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      font-family: 'Cuneiform', sans-serif;
      user-select: none; -webkit-user-select: none;
      touch-action: none; -ms-touch-action: none;
    }

    body {
      --accent: 196,165,90;
      background:
        repeating-conic-gradient(rgba(0,0,0,0.02) 0% 25%, transparent 0% 50%) 0 0 / 4px 4px,
        radial-gradient(ellipse at 30% 20%, #c4a87a, transparent 60%),
        radial-gradient(ellipse at 70% 80%, #a08055, transparent 60%),
        linear-gradient(160deg, #b89968 0%, #a0824e 30%, #8b6f3c 60%, #a08050 100%);
      background-color: #9a7b4a;
    }
    body.color-white  { --accent: 240,240,235; }
    body.color-blue   { --accent: 79,195,247; }
    body.color-yellow { --accent: 255,213,79; }
    body.color-pink   { --accent: 244,143,177; }
    body.color-red    { --accent: 239,83,80; }
    body.color-orange { --accent: 255,167,38; }
    body.color-black  { --accent: 140,120,120; }
    body.color-green  { --accent: 129,199,132; }

    /* ===== Black cover / reveal ===== */
    @property --cover {
      syntax: '<percentage>';
      initial-value: 120%;
      inherits: false;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: #000;
      z-index: 999;
      pointer-events: none;
      --cover: 120%;
      -webkit-mask-image: radial-gradient(ellipse 135% 118% at 50% 50%, black var(--cover), transparent calc(var(--cover) + 20%));
      mask-image: radial-gradient(ellipse 135% 118% at 50% 50%, black var(--cover), transparent calc(var(--cover) + 20%));
      transition: --cover 2.8s cubic-bezier(0.4, 0, 0.15, 1);
    }
    body.active::after { --cover: -25%; }

    /* ===== Layout ===== */
    #app {
      width: 1920px; height: 1080px;
      display: flex;
    }
    .side-col {
      width: 384px; height: 1080px;
      display: flex; flex-direction: column;
      padding: 30px 0;
      transition: opacity 0.5s ease;
    }
    #left-col  .side-block { justify-content: flex-end;   padding-right: 36px; }
    #right-col .side-block { justify-content: flex-start; padding-left:  36px; }
    .side-block {
      flex: 1;
      display: flex; align-items: center;
      position: relative;
    }
    .side-block img {
      height: 92px; width: auto;
      opacity: 0.35;
      filter:
        drop-shadow(1px 1px 0 rgba(220,200,160,0.45))
        drop-shadow(-1px -1px 0 rgba(40,25,10,0.35));
      transition: opacity 0.6s ease, filter 0.6s ease, transform 0.4s ease;
    }
    /* School glyphs only visible on the hand-prompt view */
    body:not(.view-hand) .side-col {
      opacity: 0;
      pointer-events: none;
    }
    .side-block.active img {
      opacity: 1;
      filter:
        drop-shadow(1px 1px 0 rgba(220,200,160,0.6))
        drop-shadow(-1px -1px 0 rgba(40,25,10,0.5))
        drop-shadow(0 0 18px rgba(var(--accent),0.8))
        drop-shadow(0 0 38px rgba(var(--accent),0.5));
      animation: side-pulse 2.2s ease-in-out infinite;
    }
    @keyframes side-pulse {
      0%, 100% {
        opacity: 0.85;
        filter:
          drop-shadow(1px 1px 0 rgba(220,200,160,0.6))
          drop-shadow(-1px -1px 0 rgba(40,25,10,0.5))
          drop-shadow(0 0 12px rgba(var(--accent),0.55))
          drop-shadow(0 0 24px rgba(var(--accent),0.3));
      }
      50% {
        opacity: 1;
        filter:
          drop-shadow(1px 1px 0 rgba(220,200,160,0.6))
          drop-shadow(-1px -1px 0 rgba(40,25,10,0.5))
          drop-shadow(0 0 28px rgba(var(--accent),0.95))
          drop-shadow(0 0 58px rgba(var(--accent),0.6));
      }
    }
    .side-block.dim img { opacity: 0.18; }

    #center-col {
      width: 1152px; height: 1080px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    /* ===== Hand prompt ===== */
    #hand-prompt {
      position: absolute; inset: 0;
      display: none;
      align-items: center; justify-content: center;
    }
    #hand-prompt.show { display: flex; }

    .hand-img {
      height: 810px;
      width: auto;
      opacity: 0.78;
      filter:
        drop-shadow(0 0 30px rgba(var(--accent),0.4))
        drop-shadow(0 0 60px rgba(var(--accent),0.2));
      animation: hand-pulse 3s ease-in-out infinite;
    }
    @keyframes hand-pulse {
      0%, 100% { opacity: 0.62; filter: drop-shadow(0 0 18px rgba(var(--accent),0.2)); }
      50%      { opacity: 0.9;  filter: drop-shadow(0 0 50px rgba(var(--accent),0.55)) drop-shadow(0 0 90px rgba(var(--accent),0.3)); }
    }

    /* ===== Cross view (4 buttons + center school glyph) ===== */
    #cross-view {
      position: absolute; inset: 0;
      display: none;
      align-items: center; justify-content: center;
    }
    #cross-view.show { display: flex; }

    .cross-container {
      position: relative;
      width: 880px; height: 880px;
    }

    .cross-center {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 360px; height: 360px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 3px solid rgba(var(--accent),0.45);
      background: radial-gradient(circle, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.02) 100%);
      animation: cross-pulse 3s ease-in-out infinite;
    }
    .cross-center img {
      height: 230px; width: auto;
      filter:
        drop-shadow(1px 1px 0 rgba(220,200,160,0.6))
        drop-shadow(-1px -1px 0 rgba(40,25,10,0.5))
        drop-shadow(0 0 22px rgba(var(--accent),0.7));
    }
    @keyframes cross-pulse {
      0%, 100% { border-color: rgba(var(--accent),0.35); box-shadow: 0 0 30px rgba(var(--accent),0.15); }
      50%      { border-color: rgba(var(--accent),0.75); box-shadow: 0 0 60px rgba(var(--accent),0.4); }
    }

    .cross-btn {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(var(--accent),0.35);
      background: radial-gradient(circle, rgba(0,0,0,0.06) 0%, transparent 100%);
      cursor: pointer;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
    }
    .cross-btn .glyph {
      font-family: 'Cuneiform', sans-serif;
      font-size: 110px; line-height: 1;
      color: rgba(60,42,20,0.9);
      text-shadow:
        1px 1px 0 rgba(220,200,160,0.6),
        -1px -1px 0 rgba(40,25,10,0.4),
        0 0 14px rgba(var(--accent),0.5);
    }
    .cross-btn:hover, .cross-btn.active {
      border-color: rgba(var(--accent),0.85);
      box-shadow: 0 0 40px rgba(var(--accent),0.4);
    }

    .cross-btn-top    { left: 50%; top: 0;    transform: translate(-50%, 0); }
    .cross-btn-right  { right: 0;  top: 50%;  transform: translate(0, -50%); }
    .cross-btn-bottom { left: 50%; bottom: 0; transform: translate(-50%, 0); }
    .cross-btn-left   { left: 0;   top: 50%;  transform: translate(0, -50%); }
    .cross-btn-top:active    { transform: translate(-50%, 0) scale(0.93); }
    .cross-btn-right:active  { transform: translate(0, -50%) scale(0.93); }
    .cross-btn-bottom:active { transform: translate(-50%, 0) scale(0.93); }
    .cross-btn-left:active   { transform: translate(0, -50%) scale(0.93); }

    /* ===== Page view (rendered markdown) ===== */
    #page-view {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px;
    }
    #page-view.show { display: flex; }

    /* ===== Preview view (hand-on without crystal): 2x4 grid of school symbols ===== */
    #preview-view {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      padding: 30px 20px;
    }
    #preview-view.show { display: flex; }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(4, 220px);
      grid-template-rows: repeat(2, 220px);
      gap: 30px 30px;
      margin-bottom: 38px;
    }
    .preview-cell {
      position: relative;
      width: 220px; height: 220px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      border: 2px solid rgba(60,42,20,0.35);
      background: radial-gradient(circle, rgba(0,0,0,0.10) 0%, transparent 75%);
    }
    /* Color halo behind each symbol — uses the crystal's color */
    .preview-cell::before {
      content: '';
      position: absolute; inset: 14px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--cell-accent),0.55) 0%, rgba(var(--cell-accent),0.18) 45%, transparent 75%);
      filter: blur(6px);
      animation: cell-pulse 3.4s ease-in-out infinite;
    }
    .preview-cell img {
      position: relative;
      height: 150px; width: auto;
      filter:
        drop-shadow(1px 1px 0 rgba(220,200,160,0.55))
        drop-shadow(-1px -1px 0 rgba(40,25,10,0.45))
        drop-shadow(0 0 14px rgba(var(--cell-accent),0.7));
    }
    @keyframes cell-pulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 1; }
    }
    /* Per-cell crystal-color overrides */
    .preview-cell[data-color="white"]  { --cell-accent: 240,240,235; }
    .preview-cell[data-color="blue"]   { --cell-accent: 79,195,247; }
    .preview-cell[data-color="yellow"] { --cell-accent: 255,213,79; }
    .preview-cell[data-color="pink"]   { --cell-accent: 244,143,177; }
    .preview-cell[data-color="red"]    { --cell-accent: 239,83,80; }
    .preview-cell[data-color="orange"] { --cell-accent: 255,167,38; }
    .preview-cell[data-color="black"]  { --cell-accent: 80,70,70; }
    .preview-cell[data-color="green"]  { --cell-accent: 129,199,132; }

    .preview-message {
      font-family: 'EbonSigil', 'Cinzel Decorative', 'Cinzel', serif;
      font-weight: 700;
      font-size: 56px;
      line-height: 1.25;
      text-align: center;
      max-width: 1050px;
      color: rgba(50,32,12,0.96);
      letter-spacing: 0.02em;
      text-shadow:
        2px 2px 0 rgba(230,210,170,0.55),
        -1px -1px 0 rgba(40,25,10,0.5),
        0 0 22px rgba(var(--accent),0.45);
    }

    #page-scroll {
      width: 100%; max-width: 1040px;
      height: 100%; max-height: 940px;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 38px 46px;
      background: transparent;
      border: none;
      scrollbar-width: thin;
      scrollbar-color: rgba(60,42,20,0.25) transparent;
      /* fade top/bottom into the parchment background */
      -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 28px, #000 calc(100% - 28px), transparent 100%);
      mask-image: linear-gradient(to bottom, transparent 0, #000 28px, #000 calc(100% - 28px), transparent 100%);
    }
    #page-scroll::-webkit-scrollbar { width: 6px; }
    #page-scroll::-webkit-scrollbar-thumb { background: rgba(60,42,20,0.25); border-radius: 3px; }
    #page-content {
      font-family: 'Cinzel', 'Cinzel Decorative', serif;
      font-size: 28px;
      color: rgba(40,28,12,0.92);
      text-shadow:
        1px 1px 0 rgba(220,200,160,0.4),
        -1px -1px 0 rgba(40,25,10,0.3);
    }
    #page-content h1 {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 900;
      font-size: 64px; line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
      color: rgba(60,42,20,1);
      text-shadow:
        2px 2px 0 rgba(230,210,170,0.6),
        -2px -2px 0 rgba(40,25,10,0.5),
        0 0 22px rgba(var(--accent),0.55);
    }
    #page-content h2 { font-family: 'Cinzel Decorative', serif; font-weight: 700; font-size: 42px; margin: 26px 0 12px; letter-spacing: 0.02em; }
    #page-content h3 { font-family: 'Cinzel Decorative', serif; font-weight: 700; font-size: 32px; margin: 20px 0 10px; letter-spacing: 0.02em; }
    #page-content p  { font-size: 28px; line-height: 1.5; margin-bottom: 18px; }
    #page-content em { color: rgba(80,55,25,0.85); font-style: italic; }
    #page-content strong { color: rgba(60,42,20,1); }
    #page-content ul, #page-content ol { margin: 12px 0 18px 36px; font-size: 26px; line-height: 1.5; }
    #page-content li { margin-bottom: 8px; }
    #page-content code {
      font-family: monospace; font-size: 22px;
      background: rgba(0,0,0,0.08); padding: 2px 6px; border-radius: 3px;
    }

    #page-close {
      position: absolute; top: 24px; right: 24px;
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(var(--accent),0.4);
      background: rgba(0,0,0,0.15);
      cursor: pointer;
      color: rgba(60,42,20,0.9);
      font-family: 'Cuneiform', sans-serif;
      font-size: 44px; line-height: 1;
      z-index: 5;
    }
    #page-close:hover { border-color: rgba(var(--accent),0.85); box-shadow: 0 0 24px rgba(var(--accent),0.35); }
    #page-close:active { transform: scale(0.92); }

    /* ===== Misc ===== */
    #exit-btn {
      position: fixed; top: 8px; right: 12px;
      font-family: 'Cuneiform', sans-serif; font-size: 0.8rem;
      color: rgba(60,42,20,0.3); background: none; border: none;
      cursor: pointer; padding: 6px 10px; z-index: 100;
    }
    #exit-btn:active { color: #ef5350; }

    @keyframes fade-in {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    .fade-in { animation: fade-in 0.6s ease forwards; }
  </style>
</head>
<body>
  <button id="exit-btn">[EXIT]</button>

  <div id="app">
    <!-- LEFT: 4 school icons -->
    <div class="side-col" id="left-col">
      <div class="side-block" data-school="abjuration"><img src="/img/schools/abjuration.png" alt="abjuration"></div>
      <div class="side-block" data-school="conjuration"><img src="/img/schools/conjuration.png" alt="conjuration"></div>
      <div class="side-block" data-school="divination"><img src="/img/schools/divination.png" alt="divination"></div>
      <div class="side-block" data-school="enchantment"><img src="/img/schools/enchantment.png" alt="enchantment"></div>
    </div>

    <!-- CENTER: hand prompt / cross view / page view -->
    <div id="center-col">
      <div id="hand-prompt">
        <img class="hand-img" src="/handprint.png" alt="">
      </div>

      <div id="cross-view">
        <div class="cross-container">
          <div class="cross-center"><img id="cross-center-img" src="" alt=""></div>
          <div class="cross-btn cross-btn-top"    data-loc="top"><span class="glyph">&#x12313;</span></div>
          <div class="cross-btn cross-btn-right"  data-loc="right"><span class="glyph">&#x122D7;</span></div>
          <div class="cross-btn cross-btn-bottom" data-loc="bottom"><span class="glyph">&#x121B3;</span></div>
          <div class="cross-btn cross-btn-left"   data-loc="left"><span class="glyph">&#x12146;</span></div>
        </div>
      </div>

      <div id="preview-view">
        <div class="preview-grid">
          <div class="preview-cell" data-color="white"><img src="/img/schools/abjuration.png"    alt="abjuration"></div>
          <div class="preview-cell" data-color="blue"><img src="/img/schools/conjuration.png"   alt="conjuration"></div>
          <div class="preview-cell" data-color="yellow"><img src="/img/schools/divination.png"  alt="divination"></div>
          <div class="preview-cell" data-color="pink"><img src="/img/schools/enchantment.png"   alt="enchantment"></div>
          <div class="preview-cell" data-color="red"><img src="/img/schools/evocation.png"      alt="evocation"></div>
          <div class="preview-cell" data-color="orange"><img src="/img/schools/illusion.png"    alt="illusion"></div>
          <div class="preview-cell" data-color="black"><img src="/img/schools/necromancy.png"   alt="necromancy"></div>
          <div class="preview-cell" data-color="green"><img src="/img/schools/transmutation.png" alt="transmutation"></div>
        </div>
        <div class="preview-message">Seek the crystals to unlock treasures, clues and dangers!</div>
      </div>

      <div id="page-view">
        <button id="page-close" title="close">&#x12471;</button>
        <div id="page-scroll">
          <div id="page-content"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: 4 school icons -->
    <div class="side-col" id="right-col">
      <div class="side-block" data-school="evocation"><img src="/img/schools/evocation.png" alt="evocation"></div>
      <div class="side-block" data-school="illusion"><img src="/img/schools/illusion.png" alt="illusion"></div>
      <div class="side-block" data-school="necromancy"><img src="/img/schools/necromancy.png" alt="necromancy"></div>
      <div class="side-block" data-school="transmutation"><img src="/img/schools/transmutation.png" alt="transmutation"></div>
    </div>
  </div>

  <script>
    // ===== Elements =====
    const handPrompt     = document.getElementById('hand-prompt');
    const crossView      = document.getElementById('cross-view');
    const crossCenterImg = document.getElementById('cross-center-img');
    const pageView       = document.getElementById('page-view');
    const pageContent    = document.getElementById('page-content');
    const pageScroll     = document.getElementById('page-scroll');
    const pageClose      = document.getElementById('page-close');
    const previewView    = document.getElementById('preview-view');
    const sideBlocks     = document.querySelectorAll('.side-block');

    const COLOR_CLASSES = ['color-white','color-blue','color-yellow','color-pink','color-red','color-orange','color-black','color-green'];

    // ===== State =====
    let crystalActive = false;
    let handActive    = false;
    let currentSchool = null;
    let currentColor  = null;
    let currentView   = 'idle';   // 'idle' | 'hand' | 'cross' | 'page'

    // ===== Audio cues =====
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.addEventListener('touchstart', () => { if (audioCtx.state==='suspended') audioCtx.resume(); }, { once: true });
    document.addEventListener('click',      () => { if (audioCtx.state==='suspended') audioCtx.resume(); }, { once: true });

    function playArcaneHum() {
      const now = audioCtx.currentTime, dur = 2.2;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.22, now); gain.gain.exponentialRampToValueAtTime(0.01, now+dur);
      gain.connect(audioCtx.destination);
      [110,165,220,330].forEach(f => {
        const o = audioCtx.createOscillator();
        o.type = 'sine'; o.frequency.value = f; o.connect(gain);
        o.start(now); o.stop(now+dur);
      });
    }
    function playCrystalChime() {
      const now = audioCtx.currentTime;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.18, now); gain.gain.exponentialRampToValueAtTime(0.001, now+1.1);
      gain.connect(audioCtx.destination);
      [523,659,784].forEach((f,i) => {
        const o = audioCtx.createOscillator();
        o.type = 'triangle'; o.frequency.value = f; o.connect(gain);
        o.start(now+i*0.08); o.stop(now+1.1);
      });
    }
    function playOrbSelect() {
      const now = audioCtx.currentTime;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.55);
      gain.connect(audioCtx.destination);
      const o = audioCtx.createOscillator();
      o.type='sine'; o.frequency.value=440;
      o.frequency.exponentialRampToValueAtTime(880, now+0.3);
      o.connect(gain); o.start(now); o.stop(now+0.55);
    }

    // ===== View transitions =====
    const VIEW_CLASSES = ['view-idle','view-hand','view-preview','view-cross','view-page'];
    function setViewClass(view) {
      VIEW_CLASSES.forEach(c => document.body.classList.remove(c));
      document.body.classList.add('view-' + view);
    }

    function hideAllViews() {
      handPrompt.classList.remove('show');
      crossView.classList.remove('show');
      pageView.classList.remove('show');
      previewView.classList.remove('show');
    }

    function showHandPrompt() {
      hideAllViews();
      currentView = 'hand';
      setViewClass('hand');
      handPrompt.classList.add('show', 'fade-in');
      highlightSchool(currentSchool);
    }

    function showPreviewView() {
      hideAllViews();
      currentView = 'preview';
      setViewClass('preview');
      previewView.classList.add('show', 'fade-in');
      clearSchoolHighlight();
    }

    function showCrossView() {
      hideAllViews();
      currentView = 'cross';
      setViewClass('cross');
      if (currentSchool) {
        crossCenterImg.src = '/img/schools/' + currentSchool + '.png';
      }
      crossView.classList.add('show', 'fade-in');
      highlightSchool(currentSchool);
    }

    function showPageView(html) {
      hideAllViews();
      currentView = 'page';
      setViewClass('page');
      pageContent.innerHTML = html;
      pageScroll.scrollTop = 0;
      pageView.classList.add('show', 'fade-in');
    }

    function highlightSchool(school) {
      sideBlocks.forEach(b => {
        b.classList.remove('active','dim');
        if (school) {
          if (b.dataset.school === school) b.classList.add('active');
          else b.classList.add('dim');
        }
      });
    }
    function clearSchoolHighlight() {
      sideBlocks.forEach(b => b.classList.remove('active','dim'));
    }

    function setAccentColor(color) {
      COLOR_CLASSES.forEach(c => document.body.classList.remove(c));
      if (color) document.body.classList.add('color-' + color);
    }

    // ===== Markdown rendering (minimal) =====
    function escHtml(s) {
      return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]);
    }
    function renderInline(s) {
      return s
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }
    function renderMarkdown(md) {
      const lines = md.split(/\r?\n/);
      const out = [];
      let inList = false;
      const closeList = () => { if (inList) { out.push('</ul>'); inList = false; } };
      for (const raw of lines) {
        const line = raw.trim();
        if (!line) { closeList(); continue; }
        let m;
        if ((m = line.match(/^### (.+)/))) { closeList(); out.push('<h3>' + renderInline(escHtml(m[1])) + '</h3>'); continue; }
        if ((m = line.match(/^## (.+)/)))  { closeList(); out.push('<h2>' + renderInline(escHtml(m[1])) + '</h2>'); continue; }
        if ((m = line.match(/^# (.+)/)))   { closeList(); out.push('<h1>' + renderInline(escHtml(m[1])) + '</h1>'); continue; }
        if ((m = line.match(/^[-*]\s+(.+)/))) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push('<li>' + renderInline(escHtml(m[1])) + '</li>');
          continue;
        }
        out.push('<p>' + renderInline(escHtml(line)) + '</p>');
      }
      closeList();
      return out.join('\n');
    }

    async function loadPage(school, location) {
      try {
        const res = await fetch('/api/page/' + school + '/' + location, { cache: 'no-store' });
        if (!res.ok) throw new Error('http ' + res.status);
        let md = await res.text();
        // Extract leading `<!-- font: NAME -->` marker and apply it to the page.
        let pageFont = null;
        const m = md.match(/^\s*<!--\s*font:\s*([\w.-]+)\s*-->\s*\r?\n?/i);
        if (m) { pageFont = m[1]; md = md.slice(m[0].length); }
        const pc = document.getElementById('page-content');
        if (pc) pc.style.fontFamily = pageFont
          ? ("'" + pageFont.replace(/'/g, "\\'") + "', 'Cinzel', 'Cinzel Decorative', serif")
          : '';
        showPageView(renderMarkdown(md));
      } catch (e) {
        showPageView('<h1>Lost in the Weave</h1><p>The page could not be retrieved.</p>');
      }
    }

    // ===== Cross button handlers =====
    document.querySelectorAll('.cross-btn').forEach(btn => {
      const fire = (e) => {
        e.preventDefault();
        if (currentView !== 'cross' || !currentSchool) return;
        playOrbSelect();
        const loc = btn.dataset.loc;
        loadPage(currentSchool, loc);
      };
      btn.addEventListener('click', fire);
      btn.addEventListener('touchend', fire);
    });

    // ===== Page close =====
    function handlePageClose(e) {
      e.preventDefault();
      playOrbSelect();
      if (handActive && crystalActive)      showCrossView();
      else if (handActive)                  showPreviewView();
      else                                  showHandPrompt();
    }
    pageClose.addEventListener('click',    handlePageClose);
    pageClose.addEventListener('touchend', handlePageClose);

    // ===== Exit =====
    function handleExit(e) {
      e.stopPropagation(); e.preventDefault();
      fetch('/exit', { method: 'POST' }).finally(() => window.close());
    }
    document.getElementById('exit-btn').addEventListener('click', handleExit);
    document.getElementById('exit-btn').addEventListener('touchend', handleExit);

    // Prevent rubber-band scroll on touch except inside page scroll area
    document.addEventListener('touchmove', (e) => {
      if (pageView.classList.contains('show') && pageScroll.contains(e.target)) return;
      e.preventDefault();
    }, { passive: false });

    // ===== WebSocket =====
    let ws, reconnectTimer;
    function connect() {
      ws = new WebSocket('ws://' + location.host);

      ws.onopen = () => { console.log('Connected'); clearTimeout(reconnectTimer); };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === 'crystal') {
          crystalActive = true;
          currentSchool = data.school || null;
          currentColor  = data.color  || null;
          setAccentColor(currentColor);
          playCrystalChime();

          if (handActive) {
            setTimeout(() => showCrossView(), 400);
          } else {
            setTimeout(() => showHandPrompt(), 400);
          }

        } else if (data.type === 'removed') {
          crystalActive = false;
          currentSchool = null;
          currentColor  = null;
          setAccentColor(null);
          clearSchoolHighlight();
          if (handActive) showPreviewView();
          else            showHandPrompt();

        } else if (data.type === 'hand-on') {
          handActive = true;
          if (currentView === 'page') return; // don't interrupt a page
          if (crystalActive) {
            playArcaneHum();
            showCrossView();
          } else {
            showPreviewView();
          }

        } else if (data.type === 'hand-off') {
          handActive = false;
          if (currentView === 'page') return; // don't interrupt a page
          showHandPrompt();

        } else if (data.type === 'reload') {
          location.reload();
        }
      };

      ws.onclose = () => { console.log('Disconnected'); reconnectTimer = setTimeout(connect, 2000); };
      ws.onerror = () => ws.close();
    }
    // Handprint is the always-on default; reveal cover immediately and show it.
    document.body.classList.add('active');
    showHandPrompt();
    connect();

    // Auto-register every font dropped into src/public/fonts/ (in addition to the
    // static @font-face rules above) so GM-selected fonts work without code changes.
    (async () => {
      try {
        const res = await fetch('/api/fonts', { cache: 'no-store' });
        if (!res.ok) return;
        const fonts = await res.json();
        const css = fonts.map(f =>
          "@font-face { font-family: '" + f.name + "'; font-display: swap; " +
          "src: url('" + f.file + "') format('" + f.format + "'); }"
        ).join('\n');
        const style = document.createElement('style');
        style.setAttribute('data-fonts', 'auto');
        style.textContent = css;
        document.head.appendChild(style);
      } catch (_) { /* fonts list is best-effort */ }
    })();
  </script>
</body>
</html>
