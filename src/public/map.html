<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
  <title>Netheril — Map</title>
  <style>
    @font-face {
      font-family: 'Cuneiform';
      src: url('/fonts/NotoSansCuneiform-Regular.ttf');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Cuneiform', -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      background: #0a0a0f;
    }

    #map-view {
      width: 1920px;
      height: 1080px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #map-container {
      position: relative;
      display: inline-block;
    }

    #map-img {
      display: block;
      max-width: 1920px;
      max-height: 1080px;
      user-select: none;
      -webkit-user-drag: none;
    }

    #no-map {
      color: #555;
      font-size: 32px;
      text-align: center;
      font-family: 'Cuneiform', sans-serif;
    }

    /* Map pins */
    .map-pin {
      position: absolute;
      transform: translate(-50%, -100%);
      font-size: 36px;
      cursor: pointer;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.8));
      transition: transform 0.2s;
      z-index: 10;
    }
    .map-pin:active {
      transform: translate(-50%, -100%) scale(1.3);
    }

    /* Info overlay */
    #pin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
    }
    #pin-overlay.show {
      display: flex;
    }

    #pin-card {
      background:
        repeating-conic-gradient(rgba(0,0,0,0.02) 0% 25%, transparent 0% 50%) 0 0 / 4px 4px,
        radial-gradient(ellipse at 30% 20%, #c4a87a, transparent 60%),
        radial-gradient(ellipse at 70% 80%, #a08055, transparent 60%),
        linear-gradient(160deg, #b89968 0%, #a0824e 30%, #8b6f3c 60%, #a08050 100%);
      background-color: #9a7b4a;
      border: 2px solid rgba(196,165,90,0.4);
      border-radius: 12px;
      max-width: 900px;
      max-height: 800px;
      width: 80%;
      padding: 48px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 0 60px rgba(196,165,90,0.2), 0 20px 60px rgba(0,0,0,0.6);
    }

    #pin-card-icon {
      font-size: 56px;
      text-align: center;
      margin-bottom: 12px;
    }

    #pin-card-title {
      font-family: 'Cuneiform', sans-serif;
      font-size: 48px;
      color: rgba(60, 42, 20, 0.9);
      text-shadow:
        2px 2px 0px rgba(200, 180, 140, 0.7),
        -2px -2px 0px rgba(40, 25, 10, 0.5),
        0 0 15px rgba(196, 165, 90, 0.4);
      text-align: center;
      margin-bottom: 24px;
    }

    #pin-card-desc {
      font-family: 'Cuneiform', sans-serif;
      font-size: 32px;
      line-height: 1.4;
      color: rgba(60, 42, 20, 0.85);
      text-shadow:
        1px 1px 0px rgba(200, 180, 140, 0.5),
        -1px -1px 0px rgba(40, 25, 10, 0.3);
      white-space: pre-wrap;
    }

    /* Close button */
    #pin-close {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 40px;
      color: rgba(196,165,90,0.6);
      background: none;
      border: none;
      cursor: pointer;
      z-index: 60;
    }
    #pin-close:active { color: #ef5350; }

    /* Back button */
    #back-btn {
      position: fixed;
      top: 12px;
      left: 16px;
      font-family: 'Cuneiform', sans-serif;
      font-size: 0.85rem;
      color: rgba(196,165,90,0.4);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      z-index: 100;
    }
    #back-btn:active { color: var(--gold, #c4a55a); }
  </style>
</head>
<body>
  <button id="back-btn" onclick="location.href='/'">← BACK</button>

  <div id="map-view">
    <div id="map-container">
      <img id="map-img" style="display:none;">
      <div id="no-map">𒀭 No map available 𒀭</div>
    </div>
  </div>

  <div id="pin-overlay">
    <button id="pin-close">✕</button>
    <div id="pin-card">
      <div id="pin-card-icon"></div>
      <div id="pin-card-title"></div>
      <div id="pin-card-desc"></div>
    </div>
  </div>

  <script>
    const mapImg = document.getElementById('map-img');
    const mapContainer = document.getElementById('map-container');
    const noMap = document.getElementById('no-map');
    const overlay = document.getElementById('pin-overlay');
    let pins = [];

    // Load map image
    function loadMap() {
      const img = new Image();
      img.onload = () => {
        mapImg.src = img.src;
        mapImg.style.display = 'block';
        noMap.style.display = 'none';
      };
      img.onerror = () => {
        mapImg.style.display = 'none';
        noMap.style.display = 'block';
      };
      img.src = '/faerunu_blank.jpg?' + Date.now();
    }

    // Fetch pins
    async function fetchPins() {
      try {
        const res = await fetch('/api/pins', { cache: 'no-store' });
        pins = await res.json();
        renderPins();
      } catch (e) {
        console.error('Failed to load pins', e);
      }
    }

    // Render pins on map
    function renderPins() {
      mapContainer.querySelectorAll('.map-pin').forEach(el => el.remove());
      pins.forEach(pin => {
        const el = document.createElement('div');
        el.className = 'map-pin';
        el.textContent = pin.icon;
        el.style.left = pin.x + '%';
        el.style.top = pin.y + '%';
        el.addEventListener('touchend', (e) => { e.preventDefault(); showPin(pin); });
        el.addEventListener('click', () => showPin(pin));
        mapContainer.appendChild(el);
      });
    }

    // Show pin detail overlay
    function showPin(pin) {
      document.getElementById('pin-card-icon').textContent = pin.icon;
      document.getElementById('pin-card-title').textContent = pin.title;
      document.getElementById('pin-card-desc').textContent = pin.description || '';
      overlay.classList.add('show');
    }

    function closeOverlay() {
      overlay.classList.remove('show');
    }

    document.getElementById('pin-close').addEventListener('click', closeOverlay);
    document.getElementById('pin-close').addEventListener('touchend', (e) => { e.preventDefault(); closeOverlay(); });
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeOverlay();
    });
    overlay.addEventListener('touchend', (e) => {
      if (e.target === overlay) { e.preventDefault(); closeOverlay(); }
    });

    // Prevent layout bounce
    document.addEventListener('touchmove', (e) => {
      const card = document.getElementById('pin-card');
      if (overlay.classList.contains('show') && card.contains(e.target)) return;
      e.preventDefault();
    }, { passive: false });

    // Poll for pin updates every 10 seconds
    setInterval(fetchPins, 10000);

    // Init
    loadMap();
    fetchPins();
  </script>
</body>
</html>
